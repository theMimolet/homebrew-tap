name: Bump dotnet-sdk-linux

on:
  schedule:
    - cron: "0 8 * * 3"  # runs every wednesday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  Bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(grep 'version "' Casks/dotnet-sdk-linux.rb | head -1 | grep -oP '[\d.]+')
          MAJOR_MINOR=$(echo $CURRENT | cut -d. -f1,2)
          LATEST=$(curl -fsSL "https://builds.dotnet.microsoft.com/dotnet/release-metadata/${MAJOR_MINOR}/releases.json" \
            | jq -r '.releases[].sdk.version' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "Could not determine latest version for ${MAJOR_MINOR}" >&2
            exit 1
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Fetch new sha256
        if: steps.version.outputs.current != steps.version.outputs.latest
        id: sha
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.latest }}
          SHA_ARM=$(curl -fsSL "https://builds.dotnet.microsoft.com/dotnet/Sdk/${VERSION}/dotnet-sdk-${VERSION}-linux-arm64.tar.gz" | sha256sum | cut -d' ' -f1)
          SHA_X64=$(curl -fsSL "https://builds.dotnet.microsoft.com/dotnet/Sdk/${VERSION}/dotnet-sdk-${VERSION}-linux-x64.tar.gz" | sha256sum | cut -d' ' -f1)
          echo "sha_arm=$SHA_ARM" >> $GITHUB_OUTPUT
          echo "sha_x64=$SHA_X64" >> $GITHUB_OUTPUT

      - name: Update cask file
        if: steps.version.outputs.current != steps.version.outputs.latest
        run: |
          VERSION=${{ steps.version.outputs.latest }}
          SHA_ARM=${{ steps.sha.outputs.sha_arm }}
          SHA_X64=${{ steps.sha.outputs.sha_x64 }}
          VERSION="$VERSION" SHA_ARM="$SHA_ARM" SHA_X64="$SHA_X64" python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("Casks/dotnet-sdk-linux.rb")
          text = path.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{os.environ["VERSION"]}"', text, count=1)
          text = re.sub(
            r'(if Hardware::CPU\.arm\?\n\s+)sha256 "[a-f0-9]+"',
            rf'\1sha256 "{os.environ["SHA_ARM"]}"',
            text,
            count=1,
          )
          text = re.sub(
            r'(else  # x64/intel\n\s+)sha256 "[a-f0-9]+"',
            rf'\1sha256 "{os.environ["SHA_X64"]}"',
            text,
            count=1,
          )
          path.write_text(text)
          PY

      - name: Open PR
        if: steps.version.outputs.current != steps.version.outputs.latest
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "bump dotnet-sdk-linux to ${{ steps.version.outputs.latest }}"
          title: "bump dotnet-sdk-linux to ${{ steps.version.outputs.latest }}"
          branch: bump/dotnet-sdk-linux-${{ steps.version.outputs.latest }}